<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Workout Tracker</title>
    <style>
        /* Add some basic styling for edit modals and buttons */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.5); } 
        .modal.active { display: block; } 
        .btn { cursor: pointer; padding: 10px; margin: 5px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Workout Tracker</h1>
    <div id="exercise-list">
        <div class="exercise-item">
            <span class="exercise-name">Push-Ups</span>
            <button class="btn edit-btn">Edit</button>
            <div class="modal" id="edit-modal"><input type="text" id="edit-exercise-name" /> <button class="btn save-btn">Save</button></div>
        </div>
    </div>
    <h2>Workout Log</h2>
    <div id="workout-log">
        <div class="log-item">
            <span>Logged: Push-Ups - 10 reps - 50 lbs</span>
            <button class="btn edit-log-btn">Edit</button>
        </div>
    </div>
    <script>
        // Add functionality for editing exercise names
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.onclick = () => {
                const exerciseItem = btn.parentNode;
                const exerciseName = exerciseItem.querySelector('.exercise-name');
                document.getElementById('edit-exercise-name').value = exerciseName.textContent;
                document.getElementById('edit-modal').classList.add('active');
                document.getElementById('edit-modal').querySelector('.save-btn').onclick = () => {
                    exerciseName.textContent = document.getElementById('edit-exercise-name').value;
                    document.getElementById('edit-modal').classList.remove('active');
                };
            };
        });

        // Add functionality for editing logged weights and reps
        document.querySelectorAll('.edit-log-btn').forEach(btn => {
            btn.onclick = () => {
                // Similar to exercise edit, include input fields and logic here.
                alert('Edit functionality for logged exercises not implemented yet.');
            };
        });
    </script>
</body>
</html>
